[tool.commitizen]
name = "cz_customize"
tag_format = "v$version"
version_scheme = "semver2"
version = "v0.80.0"
# version_provider = "scm"
major_version_zero = true

[tool.commitizen.customize]
schema_pattern = "^(feat|fix|refactor|perf|ci|chore)(\\(.+\\))?(!)?:(\\s.*)"
bump_pattern = "^(feat|fix|refactor|perf|ci|chore)(\\(.+\\))?(!)?:"
bump_map = {"BREAKING CHANGE" = "MAJOR", "feat" = "MINOR", "fix" = "PATCH", "refactor" = "PATCH", "perf" = "PATCH", "ci" = "PATCH", "chore" = "PATCH"}
